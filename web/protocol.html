<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MR MATZOS - PROTOCOL LAB</title>
<link rel="stylesheet" href="/protocol_lab.css">
<link rel="icon" href="/favicon.ico">
</head>
<body>
<div class="page">
<header class="topbar">
  <div>
    <div class="brand">MR MATZOS - PROTOCOL LAB</div>
    <div class="subline">UART terminal.</div>
  </div>
  <a href="/" class="backBtn">DASHBOARD</a>
</header>

<section class="panel">
  <div class="controls simpleControls">
    <div class="fieldGroup grow">
      <label>UART COMMAND</label>
      <input id="textInput" class="field" type="text" placeholder="Type command here, or press HELP" autocomplete="off">
    </div>
  </div>

  <div class="toolbar">
    <button id="btnSend" class="btn" type="button">SEND</button>
    <button id="btnHelp" class="btn" type="button">HELP</button>
    <button id="btnClear" class="btn ghost" type="button">CLEAR</button>
  </div>

  <div class="toolbar">
    <button id="btnDim10" class="btn" type="button">DIM 10</button>
    <button id="btnDim20" class="btn" type="button">DIM 20</button>
    <button id="btnDim30" class="btn" type="button">DIM 30</button>
    <button id="btnDim50" class="btn" type="button">DIM 50</button>
    <button id="btnDim100" class="btn" type="button">DIM MAX</button>
  </div>

  <div class="badges">
    <span class="badge">MODE: <b id="modeLbl">UART</b></span>
    <span class="badge">WS: <b id="wsLbl">DOWN</b></span>
  </div>

  <textarea id="termLog" readonly></textarea>
</section>
</div>
<script src="/device_config.js?v=clean-dashboard-3"></script>
<script src="/protocol_lab.js?v=clean-dashboard-3"></script>
</body>
</html>
